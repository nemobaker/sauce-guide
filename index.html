<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Fish & Chips Definitive Sauce Guide</title>
<style>

  header { background: #1a1a2e; color: #fff; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
  .count-badge { margin-left: auto; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; white-space: nowrap; }

  .toolbar { background: #fff; border-bottom: 1px solid #e0d9cc; padding: 14px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 10; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid #d0c9bc; border-radius: 8px; font-size: 0.9rem; background: #faf8f4; }
  .search-wrap input:focus { outline: none; border-color: #6c63ff; }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #999; font-size: 0.9rem; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1.5px solid #d0c9bc; background: #faf8f4; font-size: 0.78rem; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .filter-btn:hover { border-color: #6c63ff; color: #6c63ff; }
  .filter-btn.active { background: #6c63ff; border-color: #6c63ff; color: #fff; }

  .add-btn { margin-left: auto; padding: 8px 16px; background: #e85d3a; color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .add-btn:hover { background: #d14e2d; }

  .table-wrap { padding: 20px 24px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  th { position: sticky; top: var(--toolbar-h, 57px); z-index: 5; background: #1a1a2e; color: #fff; padding: 11px 14px; text-align: left; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; user-select: none; white-space: nowrap; box-shadow: 0 2px 0 #000; }
  th:hover { background: #2a2a4e; }
  th .sort-icon { opacity: 0.5; margin-left: 4px; }
  th.sorted .sort-icon { opacity: 1; }
  td { padding: 10px 14px; font-size: 0.87rem; border-bottom: 1px solid #f0ebe0; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #faf8f4; }
  .name-cell { font-weight: 600; }
  .desc-cell { color: #666; font-size: 0.82rem; max-width: 280px; }
  .notes-cell { color: #888; font-size: 0.82rem; font-style: italic; max-width: 200px; }

  .rating { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
  .rating.yes    { background: #d4f4dd; color: #1a7a35; }
  .rating.no     { background: #fde8e8; color: #c0392b; }
  .rating.noestar{ background: #ffe4d6; color: #c0392b; }
  .rating.maybe  { background: #fff4cc; color: #8a6000; }
  .rating.unsure { background: #e8e8f0; color: #555; }
  .rating.blank  { background: #f0f0f0; color: #999; }

  .empty-state { text-align: center; padding: 60px 24px; color: #999; }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state .add-from-search { margin-top: 16px; padding: 8px 20px; background: #e85d3a; color: #fff; border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .empty-state .add-from-search:hover { background: #d14e2d; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 28px; width: 100%; max-width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 0.78rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1.5px solid #d0c9bc; border-radius: 7px; font-size: 0.88rem; font-family: inherit; background: #faf8f4; }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #6c63ff; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { padding: 8px 18px; border: 1.5px solid #ccc; background: #fff; border-radius: 7px; cursor: pointer; font-size: 0.88rem; }
  .btn-save { padding: 8px 18px; background: #e85d3a; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-size: 0.88rem; font-weight: 600; }

<header>
  <h1>Fish &amp; Chips Definitive Sauce Guide</h1>
  <span class="count-badge" id="countBadge">— sauces</span>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search sauces…" oninput="render()">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
    <button class="filter-btn" data-filter="yes" onclick="setFilter(this)">✅ Both yes</button>
    <button class="filter-btn" data-filter="nemo-yes" onclick="setFilter(this)">🐟 Nemo yes</button>
    <button class="filter-btn" data-filter="chipper-yes" onclick="setFilter(this)">🍪 Chipper yes</button>
    <button class="filter-btn" data-filter="unsure" onclick="setFilter(this)">🤔 Unsure</button>
    <button class="filter-btn" data-filter="no" onclick="setFilter(this)">❌ Both no</button>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add Sauce</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="setSort('name')">Name <span class="sort-icon">↕</span></th>
        <th onclick="setSort('description')">Description <span class="sort-icon">↕</span></th>
        <th onclick="setSort('nemo')">🐟 Nemo <span class="sort-icon">↕</span></th>
        <th onclick="setSort('chipper')">🍪 Chipper <span class="sort-icon">↕</span></th>
        <th>Notes</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="big">🫙</div>
    <div>No sauces match your search.</div>
    <button class="add-from-search" onclick="openModalFromSearch()">+ Add Sauce</button>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeIfBg(event)">
  <div class="modal">
    <h2 id="modalTitle">Add New Sauce</h2>
    <div class="form-row">
      <div class="form-group full">
        <label>Sauce Name</label>
        <input type="text" id="fName" placeholder="e.g. Sriracha">
      </div>
      <div class="form-group full">
        <label>Description</label>
        <input type="text" id="fDesc" placeholder="Brief description">
      </div>
      <div class="form-group">
        <label>🐟 Nemo</label>
        <select id="fNemo">
          <option value="yes">Yes</option>
          <option value="no">No</option>
          <option value="no*">No*</option>
          <option value="maybe">Maybe</option>
          <option value="unsure" selected>Unsure</option>
        </select>
      </div>
      <div class="form-group">
        <label>🍪 Chipper</label>
        <select id="fChipper">
          <option value="yes">Yes</option>
          <option value="no">No</option>
          <option value="no*">No*</option>
          <option value="maybe">Maybe</option>
          <option value="unsure" selected>Unsure</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Any caveats, exceptions, thoughts…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSauce()">Save Sauce</button>
    </div>
  </div>
</div>

const STORAGE_KEY = 'sauce_guide_v1';

function loadSauces() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return RAW.map(r => ({ name: r[0], description: r[1], nemo: normalize(r[2]), chipper: normalize(r[3]), notes: r[4] || '' }));
}

function saveSauces() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sauces));
}

function normalize(v) {
  if (!v) return '';
  const s = v.toString().toLowerCase().trim();
  if (s === 'yes') return 'yes';
  if (s === 'no*') return 'no*';
  if (s === 'no') return 'no';
  if (s === 'maybe') return 'maybe';
  if (s === 'unsure') return 'unsure';
  return s;
}

let sauces = loadSauces();
let currentFilter = 'all';
let sortKey = 'name';
let sortDir = 1;
let editingIdx = null;

function ratingOrder(r) {
  return { yes: 0, maybe: 1, unsure: 2, 'no*': 3, no: 4, '': 5 }[r] ?? 5;
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const headers = ['name','description','nemo','chipper'];
  const idx = headers.indexOf(key);
  if (idx >= 0) document.querySelectorAll('th')[idx].classList.add('sorted');
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return sauces.filter(s => {
    const matchQ = !q || [s.name, s.description, s.notes].some(f => f && f.toLowerCase().includes(q));
    if (!matchQ) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'yes') return s.nemo === 'yes' && s.chipper === 'yes';
    if (currentFilter === 'nemo-yes') return s.nemo === 'yes';
    if (currentFilter === 'chipper-yes') return s.chipper === 'yes';
    if (currentFilter === 'unsure') return s.nemo === 'unsure' || s.chipper === 'unsure';
    if (currentFilter === 'no') return s.nemo === 'no' && s.chipper === 'no';
    return true;
  });
}

function sorted(arr) {
  return [...arr].sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (sortKey === 'nemo' || sortKey === 'chipper') {
      return sortDir * (ratingOrder(av) - ratingOrder(bv));
    }
    return sortDir * av.localeCompare(bv);
  });
}

function ratingBadge(r) {
  const map = { yes: ['yes','Yes'], no: ['no','No'], 'no*': ['noestar','No*'], maybe: ['maybe','Maybe'], unsure: ['unsure','Unsure'], '': ['blank','—'] };
  const [cls, label] = map[r] ?? ['blank','—'];
  return `<span class="rating ${cls}">${label}</span>`;
}

function render() {
  const data = sorted(filtered());
  const tbody = document.getElementById('tbody');
  document.getElementById('countBadge').textContent = `${sauces.length} sauces`;
  if (!data.length) {
    tbody.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  tbody.innerHTML = data.map(s => {
    const idx = sauces.indexOf(s);
    return `<tr>
      <td class="name-cell">${esc(s.name)}<span class="edit-link" onclick="openEdit(${idx})">✏️</span></td>
      <td class="desc-cell">${esc(s.description)}</td>
      <td>${ratingBadge(s.nemo)}</td>
      <td>${ratingBadge(s.chipper)}</td>
      <td class="notes-cell">${esc(s.notes)}</td>
      <td></td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openModal() {
  editingIdx = null;
  document.getElementById('modalTitle').textContent = 'Add New Sauce';
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fNemo').value = 'unsure';
  document.getElementById('fChipper').value = 'unsure';
  document.getElementById('fNotes').value = '';
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('fName').focus();
}

function openEdit(idx) {
  editingIdx = idx;
  const s = sauces[idx];
  document.getElementById('modalTitle').textContent = 'Edit Sauce';
  document.getElementById('fName').value = s.name;
  document.getElementById('fDesc').value = s.description;
  document.getElementById('fNemo').value = s.nemo || 'unsure';
  document.getElementById('fChipper').value = s.chipper || 'unsure';
  document.getElementById('fNotes').value = s.notes;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function closeIfBg(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
}

function saveSauce() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const sauce = {
    name,
    description: document.getElementById('fDesc').value.trim(),
    nemo: document.getElementById('fNemo').value,
    chipper: document.getElementById('fChipper').value,
    notes: document.getElementById('fNotes').value.trim()
  };
  if (editingIdx !== null) {
    sauces[editingIdx] = sauce;
  } else {
    sauces.push(sauce);
    document.getElementById('search').value = '';
  }
  saveSauces();
  closeModal();
  render();
}

function openModalFromSearch() {
  const q = document.getElementById('search').value.trim();
  openModal();
  if (q) document.getElementById('fName').value = q;
}

function updateToolbarHeight() {
  const h = document.querySelector('.toolbar').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--toolbar-h', Math.round(h) + 'px');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
window.addEventListener('resize', updateToolbarHeight);
updateToolbarHeight();
render();
</script>
</body>
</html>
